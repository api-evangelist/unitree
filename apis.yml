type: Index
position: Provider
access: 3rd-Party
kind: contract
x-tier: 2
x-tier-reason: >-
  Tier 2 — SDK-only developer surface. Unitree publishes mature, BSD/MIT
  licensed C++ and Python SDKs (unitree_sdk2, unitree_sdk2_python,
  unitree_legged_sdk, z1_sdk, unilidar_sdk2), full ROS/ROS2 bindings,
  simulation environments (MuJoCo, Isaac Lab, PyBullet), and RL/IL/VLA
  reference stacks. There is no public REST, GraphQL, or gRPC cloud API —
  developers communicate with robots locally over DDS. Documentation
  portal exists at support.unitree.com/home/en/developer. Tier 3 would
  require a hosted cloud API; Tier 1 would require an OpenAPI/AsyncAPI
  spec, plans, rate limits, and FinOps surface, none of which apply here.
