aid: unitree
name: Unitree Robotics
description: >-
  Unitree Robotics is a Hangzhou, China-based high-performance robot
  manufacturer founded in 2016 by Wang Xingxing. The company is a global
  pioneer in the commercial quadruped (robot dog) market and has expanded
  into bipedal humanoid robots. Its product line includes the Go1, Go2,
  and Go2-W quadrupeds for consumers, education, and research; the
  industrial-grade B1 and B2 quadrupeds for inspection, patrol, and
  logistics; the H1 full-size humanoid; the G1 humanoid for research and
  developer experimentation; the R1 humanoid; and the Z1 robotic arm.
  Unitree also produces in-house components including the L1/L2 LiDAR,
  hand-grade actuators, and dexterous hands (Dex1-1). Unitree's developer
  surface is SDK-centric — there is no public REST or gRPC cloud API.
  Robot control happens on-device over DDS (Data Distribution Service)
  via the unitree_sdk2 (C++) and unitree_sdk2_python libraries, with
  high-level message bindings published as unitree_ros and unitree_ros2.
  The company maintains an active GitHub presence at
  github.com/unitreerobotics with 46+ public repositories covering SDKs,
  ROS packages, MuJoCo and Isaac Lab simulation environments,
  reinforcement learning frameworks (unitree_rl_gym, unitree_rl_lab),
  teleoperation tooling (xr_teleoperate, kinect_teleoperate, televuer),
  imitation learning (unitree_lerobot), a vision-language-action model
  (unifolm-vla), and a Unitree App Store template repo. Documentation
  lives at support.unitree.com/home/en/developer. Unitree's revenue
  model is direct robot hardware sales via shop.unitree.com and partner
  distribution; there is no metered API service tier.
